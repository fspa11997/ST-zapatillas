<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        h1{
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#28a745;
            color:white;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        .bajo-stock{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <h1>Inventario</h1>

    {% if inventario %}
    <table>
        <thead>
            <tr>
                {% for key in inventario[0].keys() %}
                <th>{{ key }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for item in inventario %}
            <tr>
                {% for valor in item.values() %}
                <td>{{ valor }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>No hay inventario registrado.</p>
    {% endif %}

</body>
</html>
