<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f6f9;
        }

        h1 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #0d6efd;
            color: white;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<h1>Productos</h1>

{% if productos %}

<table>
    <thead>
        <tr>
            {% for columna in productos[0].keys() %}
            <th>{{ columna }}</th>
            {% endfor %}
        </tr>
    </thead>

    <tbody>
        {% for producto in productos %}
        <tr>
            {% for valor in producto.values() %}
            <td>{{ valor }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>

{% else %}
<p>No hay productos registrados.</p>
{% endif %}

</body>
</html>
